site_name: OpSisttems - Documentação
site_description: Documentação técnica do sistema OpSisttems
site_author: Móveis Gottems

theme:
  name: material
  language: pt-BR

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Início: index.md

  - Versões:
      - 1.x:
          - 1.9: versoes/1/1_9.md
          - 1.8: versoes/1/1_8.md
          - 1.7: versoes/1/1_7.md
          - 1.6: versoes/1/1_6.md
          - 1.5: versoes/1/1_5.md
          - 1.4: versoes/1/1_4.md
          - 1.3: versoes/1/1_3.md
          - 1.2: versoes/1/1_2.md
          - 1.1: versoes/1/1_1.md

  - Diário Técnico: diario-tecnico.md

  - Programação:
      - Programação: programacao.md
      - Produção Produtos: produto-programacao.md
      - PCP Simplificado: pcp-simplificado.md
      - Produção Filial: corte-filial.md

  - Engenharia:
      - Ficha Técnica: ficha-tecnica.md
      - Tempos de Processo: tempos.md

  - Estoque:
      - Estoque Montagem: estoque-componente.md
      - Visualizador de Lote: visualizador-lote.md

  - Manutenção: manutencao.md

  - WEB:
      - 0.x:
          - 0.1: web/0x/0_1.md